<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Panel — Nahel</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { padding-top: 0; background: #f0f0f0; }
    .admin-wrap { max-width: 960px; margin: 24px auto; padding: 0 16px; }
    .hidden { display: none !important; }
    .box { background: #fff; border: 4px solid #000; padding: 24px; margin-bottom: 24px; }
    .box h2 { background: #ffee00; padding: 8px; display: inline-block; margin-bottom: 24px; font-family: "Courier New", monospace; text-transform: uppercase; font-size: 18px; }
    .box h2.pink { background: #ff3366; color: #fff; }
    .box h2.green { background: #00ff88; }
    .box h2.cyan { background: #00ccff; }
    .box h2.orange { background: #ff6600; color: #fff; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; padding: 16px; background: #00ff88; border: 4px solid #000; }
    .header h1 { font-family: "Courier New", monospace; text-transform: uppercase; font-size: 22px; }
    .fg { margin-bottom: 16px; }
    .fg label { display: block; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; font-size: 13px; }
    .fg input, .fg select { width: 100%; padding: 12px; border: 3px solid #000; font-family: "Courier New", monospace; }
    .btn-admin { padding: 12px 24px; border: 4px solid #000; background: #00ccff; font-family: "Courier New", monospace; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .btn-admin:hover { background: #ff3366; color: #fff; }
    .btn-danger { background: #ff3366; color: #fff; padding: 8px 16px; border: 3px solid #000; cursor: pointer; font-family: inherit; }
    .btn-danger:hover { background: #000; }
    .msg { padding: 12px; border: 3px solid #000; margin-bottom: 16px; }
    .msg.success { background: #00ff88; }
    .msg.error { background: #ff3366; color: #fff; }
    .login-box { max-width: 360px; margin: 80px auto; background: #fff; border: 4px solid #000; padding: 40px; }
    .login-box h1 { background: #ff3366; color: #fff; padding: 8px; margin-bottom: 24px; text-transform: uppercase; font-size: 20px; }
    .login-box input { width: 100%; padding: 12px; border: 3px solid #000; font-family: "Courier New", monospace; margin-bottom: 16px; }
    .login-box button { width: 100%; padding: 14px; border: 4px solid #000; background: #00ff88; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .login-box button:hover { background: #00ccff; }
    .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 16px; }
    .photo-item { border: 4px solid #000; padding: 8px; background: #fff; }
    .photo-item img { width: 100%; height: 140px; object-fit: cover; display: block; }
    .photo-info { margin-top: 8px; font-size: 13px; }
    .cats { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .cats span { background: #000; color: #fff; padding: 6px 12px; font-size: 13px; border: 2px solid #000; }
    .logout { background: #ff3366; color: #fff; padding: 12px 24px; text-decoration: none; border: 3px solid #000; font-weight: 700; text-transform: uppercase; cursor: pointer; }
    .logout:hover { background: #000; }
  </style>
</head>
<body>
  <div id="app"></div>

  <script>
    const TOKEN_KEY = "admin_token";
    const BASE = "/api";

    function getToken() { return localStorage.getItem(TOKEN_KEY); }
    function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
    function clearToken() { localStorage.removeItem(TOKEN_KEY); }

    async function api(path, opts = {}) {
      const token = getToken();
      const headers = { ...opts.headers };
      if (token) headers["Authorization"] = token;
      if (!(opts.body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
      }
      const res = await fetch(BASE + path, { ...opts, headers });
      if (res.status === 401) { clearToken(); render(); }
      return res;
    }

    function render() {
      const app = document.getElementById("app");
      const token = getToken();
      if (token) renderAdmin(app);
      else renderLogin(app);
    }

    function renderLogin(container) {
      container.innerHTML = `
        <div class="login-box">
          <h1>Admin Login</h1>
          <div id="loginMsg"></div>
          <form id="loginForm">
            <input type="password" id="pass" placeholder="Password" required />
            <button type="submit">Login</button>
          </form>
        </div>
      `;
      document.getElementById("loginForm").onsubmit = async (e) => {
        e.preventDefault();
        const loginMsg = document.getElementById("loginMsg");
        const res = await fetch(BASE + "/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ password: document.getElementById("pass").value })
        });
        const data = await res.json();
        if (data.ok) {
          setToken(data.token);
          render();
        } else {
          loginMsg.innerHTML = '<div class="msg error">Wrong password!</div>';
        }
      };
    }

    function renderAdmin(container) {
      container.innerHTML = `
        <div class="admin-wrap">
          <div class="header">
            <h1>Admin Panel</h1>
            <button class="logout" id="logoutBtn">Logout</button>
          </div>
          <div id="adminContent">Loading...</div>
        </div>
      `;
      document.getElementById("logoutBtn").onclick = () => { clearToken(); render(); };
      loadAdmin();
    }

    async function loadAdmin() {
      const content = document.getElementById("adminContent");
      try {
        const [cats, photos] = await Promise.all([
          api("/categories").then(r => r.json()),
          api("/photos").then(r => r.json())
        ]);

        content.innerHTML = `
          <div class="box">
            <h2>Upload Photo</h2>
            <form id="uploadForm">
              <div class="fg">
                <label>Select Photo</label>
                <input type="file" name="photo" accept="image/*" required />
              </div>
              <div class="fg">
                <label>Category</label>
                <select name="category">
                  ${cats.map(c => `<option value="${c}">${c.charAt(0).toUpperCase() + c.slice(1)}</option>`).join("")}
                </select>
              </div>
              <div class="fg">
                <label>Title</label>
                <input type="text" name="title" placeholder="Photo title" required />
              </div>
              <button class="btn-admin" type="submit">Upload</button>
            </form>
            <div id="uploadMsg"></div>
          </div>

          <div class="box">
            <h2 class="orange">Manage Categories</h2>
            <form id="catForm">
              <div class="fg">
                <label>New Category Name</label>
                <input type="text" name="category" placeholder="e.g. landscape" required />
              </div>
              <button class="btn-admin" type="submit">Add Category</button>
            </form>
            <div id="catMsg"></div>
            <div style="margin-top:16px;"><strong>Existing:</strong></div>
            <div class="cats">${cats.map(c => `<span>${c}</span>`).join("")}</div>
          </div>

          <div class="box">
            <h2 class="pink">Photo Gallery (${photos.length} photos)</h2>
            <div class="preview-grid">
              ${photos.map(p => `
                <div class="photo-item">
                  <img src="${p.src}" alt="${p.title}" />
                  <div class="photo-info"><strong>${p.title}</strong><br>Category: ${p.category}</div>
                  <button class="btn-danger" onclick="deletePhoto('${p.public_id}')">Delete</button>
                </div>
              `).join("")}
            </div>
          </div>
        `;

        document.getElementById("uploadForm").onsubmit = async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const msg = document.getElementById("uploadMsg");
          const res = await fetch(BASE + "/upload", {
            method: "POST",
            headers: { "Authorization": getToken() },
            body: fd
          });
          if (res.ok) {
            msg.innerHTML = '<div class="msg success">Uploaded! Reloading...</div>';
            setTimeout(() => loadAdmin(), 1500);
          } else {
            msg.innerHTML = '<div class="msg error">Upload failed</div>';
          }
        };

        document.getElementById("catForm").onsubmit = async (e) => {
          e.preventDefault();
          const fd = new FormData(e.target);
          const msg = document.getElementById("catMsg");
          const res = await api("/add-category", {
            method: "POST",
            body: JSON.stringify({ category: fd.get("category") })
          });
          const data = await res.json();
          if (data.ok) {
            msg.innerHTML = '<div class="msg success">Category added! Reloading...</div>';
            setTimeout(() => loadAdmin(), 1500);
          } else {
            msg.innerHTML = '<div class="msg error">' + (data.error || "Failed") + '</div>';
          }
        };

      } catch (err) {
        content.innerHTML = '<div class="msg error">Failed to load admin</div>';
        console.error(err);
      }
    }

    window.deletePhoto = async (public_id) => {
      if (!confirm("Delete this photo?")) return;
      const res = await api("/delete", {
        method: "POST",
        body: JSON.stringify({ public_id })
      });
      if (res.ok) loadAdmin();
    };

    render();
  </script>
</body>
</html>
